spring:
  application:
    name: ecommerce
  datasource:
    url: jdbc:postgresql://localhost:5432/catalog-db
    username: postgres
    password: P@ssword1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  data:
    web:
      pageable:
        one-indexed-parameters: true
        max-page-size: 100
  threads:
    virtual:
      enabled: true
  mvc:
    apiversion:
      supported: "1.0"
      default-version: "1.0"
      use:
        header: "X-API-Version"
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
